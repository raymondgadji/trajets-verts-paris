app = "trajets-verts-paris"
primary_region = "par"

[build]
  builder = "paketobuildpacks/builder:base"  # ou "paketobuildpacks/builder-jammy-base" si besoin

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[processes]
  app = "streamlit run app.py --server.port $PORT --server.address 0.0.0.0"